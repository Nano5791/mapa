<script>
  // Inicializar mapa
  var map = L.map('map').setView([-34.6037, -58.3816], 12);

  // Tiles de OpenStreetMap
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  // Consumir la API de Adalo
  fetch("https://api.adalo.com/v0/apps/TU_APP_ID/collections/eventos", {
    headers: { "Authorization": "Bearer TU_API_KEY" }
  })
  .then(res => res.json())
  .then(data => {
    data.records.forEach(evento => {
      // Crear marcador por cada evento
      L.marker([evento.Latitud, evento.Longitud]).addTo(map)
        .bindPopup(`<b>${evento.Nombre}</b><br>${evento.Descripcion}`);
    });
  });
</script>
