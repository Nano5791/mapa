<!DOCTYPE html>
<html>
<head>
  <title>Mapa Comunitario</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <div id="map" style="width:100%; height:100vh;"></div>
  <script>
    // Inicializar mapa centrado en Buenos Aires
    var map = L.map('map').setView([-34.6037, -58.3816], 12);

    // Cargar tiles de OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Ejemplo: agregar un marcador
    L.marker([-34.6037, -58.3816]).addTo(map)
      .bindPopup('Evento en Buenos Aires')
      .openPopup();
  </script>
</body>
</html>
