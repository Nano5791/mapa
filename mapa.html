<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mapa de Eventos Therian Hub</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body style="margin:0; padding:0;">
  <div id="map" style="width:100%; height:100vh;"></div>
  <script>
    // Inicializar mapa
    var map = L.map('map').setView([-34.6037, -58.3816], 12); // Buenos Aires

    // Cargar tiles de OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Ejemplo de evento
    var marker = L.marker([-34.5885, -58.4032]).addTo(map);
    marker.bindPopup(`
      <b>Encuentro Therian en Palermo</b><br>
      15 de marzo, 18:00 hs<br>
      Precio: $5000<br>
      <a href="https://mpago.la/abc123" target="_blank">Comprar entrada</a>
    `);
  </script>
</body>
</html>
